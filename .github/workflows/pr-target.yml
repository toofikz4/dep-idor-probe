name: PR Target Test
on:
  pull_request_target:
    types: [opened, synchronize]
permissions:
  contents: write
  pull-requests: write
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Show context
        run: |
          echo "GITHUB_TOKEN permissions:"
          echo "event=${{ github.event_name }}"
          echo "head_repo=${{ github.event.pull_request.head.repo.full_name }}"
          echo "base_repo=${{ github.event.pull_request.base.repo.full_name }}"
          echo "actor=${{ github.actor }}"
          echo "triggering_actor=${{ github.triggering_actor }}"
      - name: Checkout HEAD (DANGEROUS - checks out attacker code)
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
      - name: Show what was checked out
        run: |
          echo "Checked out files:"
          ls -la
          echo "HEAD SHA: $(git rev-parse HEAD)"
