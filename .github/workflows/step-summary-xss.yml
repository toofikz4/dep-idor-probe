name: Step Summary XSS Test
on: [workflow_dispatch]
jobs:
  xss-test:
    runs-on: ubuntu-latest
    steps:
      - name: XSS payloads in step summary
        run: |
          cat >> $GITHUB_STEP_SUMMARY << 'PAYLOADS'
